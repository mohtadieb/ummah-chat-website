<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Ummah Chat — Email confirmed</title>

<style>
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#F6FAF7;
color:#163128;
display:flex;
min-height:100vh;
align-items:center;
justify-content:center;
padding:24px;
}
.card{
width:100%;
max-width:560px;
background:white;
border:1px solid #E3EFE8;
border-radius:28px;
overflow:hidden;
box-shadow:0 14px 40px rgba(0,0,0,0.06);
}
.hero{
padding:36px 28px;
color:white;
text-align:center;
background:linear-gradient(135deg,#0D6746,#2D8C67,#7BC6A4);
}
.content{
padding:32px 28px;
text-align:center;
}
.button{
display:inline-block;
background:linear-gradient(135deg,#0D6746,#2D8C67,#7BC6A4);
color:white;
font-weight:700;
padding:16px 26px;
border-radius:14px;
text-decoration:none;
font-size:16px;
box-shadow:0 10px 22px rgba(13,103,70,0.22);
border:0;
cursor:pointer;
}
.muted{
color:#666;
line-height:1.5;
}
.footer{
padding:20px 28px;
text-align:center;
font-size:12px;
color:#999;
border-top:1px solid #E3EFE8;
}
.hidden{
display:none;
}
</style>
</head>

<body>

<div class="card">

<div class="hero">
<div style="font-size:30px;font-weight:800;">
Confirming your email
</div>

<div style="margin-top:10px;font-size:15px;">
Please wait while we complete your Ummah Chat confirmation.
</div>
</div>

<div class="content">

<p id="status" class="muted">
Processing your confirmation link...
</p>

<div id="successBox" class="hidden">
<p style="font-size:22px;font-weight:800;">
Email confirmed
</p>

<p class="muted">
Your email has been confirmed. You can now sign in.
</p>

<a class="button" href="ummahchat://auth-callback">
Open Ummah Chat app
</a>
</div>

<div id="errorBox" class="hidden">
<p style="font-size:22px;font-weight:800;">
Confirmation failed
</p>

<p id="errorText" class="muted">
This confirmation link may be expired or invalid.
</p>
</div>

</div>

<div class="footer">
Ummah Chat
</div>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const SUPABASE_URL = "https://njotewktazwhoprvhsvj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5qb3Rld2t0YXp3aG9wcnZoc3ZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE4MzY1NjgsImV4cCI6MjA3NzQxMjU2OH0.SDr9TdrMIm-6LXdaaAMMhFDujt-PAgqyreebWPtV9NQ";

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const params = new URLSearchParams(window.location.search);

const token_hash = params.get("token_hash");
const type = params.get("type");

const status = document.getElementById("status");
const successBox = document.getElementById("successBox");
const errorBox = document.getElementById("errorBox");
const errorText = document.getElementById("errorText");

async function confirmEmail() {
  if (!token_hash) {
    status.style.display = "none";
    errorBox.classList.remove("hidden");
    return;
  }

  try {
    const { error } = await supabase.auth.verifyOtp({
      token_hash,
      type
    });

    if (error) throw error;

    status.style.display = "none";
    successBox.classList.remove("hidden");

    const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

    if (isMobile) {
      setTimeout(() => {
        window.location.href = "ummahchat://auth-callback";
      }, 500);
    }
  } catch (err) {
    status.style.display = "none";
    errorBox.classList.remove("hidden");
    errorText.innerText = err.message;
  }
}

confirmEmail();
</script>

</body>
</html>
