<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Ummah Chat — Reset password</title>
<style>
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#F6FAF7;
color:#163128;
display:flex;
min-height:100vh;
align-items:center;
justify-content:center;
padding:24px;
}
.card{
width:100%;
max-width:560px;
background:white;
border:1px solid #E3EFE8;
border-radius:28px;
overflow:hidden;
box-shadow:0 14px 40px rgba(0,0,0,0.06);
}
.hero{
padding:36px 28px;
color:white;
text-align:center;
background:linear-gradient(135deg,#0D6746,#2D8C67,#7BC6A4);
}
.content{
padding:32px 28px;
text-align:center;
}
.input{
width:100%;
box-sizing:border-box;
padding:14px;
margin-top:10px;
border-radius:12px;
border:1px solid #DDEAE2;
font-size:15px;
}
.button{
display:inline-block;
background:linear-gradient(135deg,#0D6746,#2D8C67,#7BC6A4);
color:white;
font-weight:700;
padding:16px 26px;
border-radius:14px;
text-decoration:none;
font-size:16px;
box-shadow:0 10px 22px rgba(13,103,70,0.22);
border:0;
cursor:pointer;
margin-top:16px;
}
.muted{
color:#666;
line-height:1.5;
}
.footer{
padding:20px 28px;
text-align:center;
font-size:12px;
color:#999;
border-top:1px solid #E3EFE8;
}
.hidden{
display:none;
}
</style>
</head>
<body>

<div class="card">
  <div class="hero">
    <div style="font-size:30px;font-weight:800;">
      Reset your password
    </div>

    <div style="margin-top:10px;font-size:15px;line-height:1.5;">
      Enter a new password for your Ummah Chat account.
    </div>
  </div>

  <div class="content">
    <p id="status" class="muted">Checking your reset link...</p>

    <div id="resetBox" class="hidden">
      <input id="password1" class="input" type="password" placeholder="New password" />
      <input id="password2" class="input" type="password" placeholder="Confirm password" />
      <button class="button" id="updateBtn">Update password</button>
    </div>

    <div id="successBox" class="hidden">
      <p style="font-size:22px;font-weight:800;">Password updated</p>
      <p class="muted">You can now log in to Ummah Chat with your new password.</p>
      <a class="button" href="ummahchat://reset-password">Open Ummah Chat app</a>
    </div>

    <div id="errorBox" class="hidden">
      <p style="font-size:22px;font-weight:800;">Reset failed</p>
      <p id="errorText" class="muted">The reset link may be expired or invalid.</p>
    </div>
  </div>

  <div class="footer">
    Ummah Chat
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const SUPABASE_URL = "https://njotewktazwhoprvhsvj.supabase.co";
const SUPABASE_ANON_KEY = "YOUR_UMMAH_CHAT_ANON_KEY";

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const params = new URLSearchParams(window.location.search);
const token_hash = params.get("token_hash");
const type = params.get("type");

const status = document.getElementById("status");
const resetBox = document.getElementById("resetBox");
const successBox = document.getElementById("successBox");
const errorBox = document.getElementById("errorBox");
const errorText = document.getElementById("errorText");
const updateBtn = document.getElementById("updateBtn");

const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

async function startRecovery() {
  if (!token_hash || !type) {
    status.style.display = "none";
    errorBox.classList.remove("hidden");
    errorText.textContent = "Missing token or type in the recovery URL.";
    return;
  }

  if (isMobile) {
    const deepLink =
      `ummahchat://reset-password?token_hash=${encodeURIComponent(token_hash)}&type=${encodeURIComponent(type)}`;

    window.location.href = deepLink;

    setTimeout(() => {
      status.textContent = "If the app did not open automatically, tap the button below.";

      const fallbackBtn = document.createElement("a");
      fallbackBtn.href = deepLink;
      fallbackBtn.className = "button";
      fallbackBtn.textContent = "Open Ummah Chat app";
      status.insertAdjacentElement("afterend", fallbackBtn);
    }, 1200);

    return;
  }

  try {
    const { error } = await supabase.auth.verifyOtp({
      token_hash,
      type
    });

    if (error) throw error;

    status.style.display = "none";
    resetBox.classList.remove("hidden");
  } catch (err) {
    status.style.display = "none";
    errorBox.classList.remove("hidden");
    errorText.textContent = err?.message || "The reset link may be expired or invalid.";
  }
}

async function updatePassword() {
  const p1 = document.getElementById("password1").value;
  const p2 = document.getElementById("password2").value;

  if (!p1 || p1 !== p2) {
    alert("Passwords do not match");
    return;
  }

  const { error } = await supabase.auth.updateUser({
    password: p1
  });

  if (error) {
    alert(error.message);
    return;
  }

  resetBox.classList.add("hidden");
  successBox.classList.remove("hidden");
}

updateBtn.addEventListener("click", updatePassword);
startRecovery();
</script>

</body>
</html>
